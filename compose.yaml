services:
  pgvector:
    image: ankane/pgvector:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-application-network
    labels:
      - "org.springframework.boot.service-connection=postgres"
    ports:
      - '5432:5432'

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-application-network
    labels:
      - "org.springframework.boot.service-connection=redis"
    ports:
      - '6379:6379'

volumes:
  postgres_data:
  redis_data:

networks:
  rag-application-network:
    name: rag-application-network
    driver: bridge